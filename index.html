        <meta name="description" content="TheBenMeadows Personal Link Site" />
        <meta http-equiv="content-language" content="en-us" />

            property="og:description"

        <!-- Critical CSS -->
        <style>
            .hidden-until-loaded {
                display: none;
            }
            /* Additional CSS for social icons */
            .social-icons {
                display: flex;
                flex-wrap: wrap; /* Ensure icons wrap */
                justify-content: center;
                align-items: center;
                gap: 20px; /* Space between icons */
                margin-top: 20px;
            }
            .social-icons a {
                transition: transform 0.3s ease; /* Smooth transformation for hover effects */
            }
            .social-icons a:hover {
                transform: scale(1.1); /* Enlarges icons slightly on hover */
            }
            .social-icons img {
                font-size: 30px; /* Set size of icons */
                width: 30px;
                height: 30px;
                vertical-align: middle;
            }
        </style>

        <!-- Favicon Icons -->
        <link rel="icon" href="favicon/favicon.ico" type="image/x-icon" />
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="favicon/apple-touch-icon.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="favicon/favicon-32x32.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="16x16"
            href="favicon/favicon-16x16.png"
        />
        <link rel="manifest" href="favicon/site.webmanifest" />

        <!-- Style Sheet -->
        <script>
            console.warn = function () {};
        </script>
        <link rel="stylesheet" href="/output.css" />
